<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>{{ site.title }}</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#004882",
              "error-dim": "#bb5551",
              "on-tertiary-container": "#4c4e69",
              "surface-dim": "#0a0e14",
              "on-secondary-container": "#bdbfc5",
              "surface-tint": "#a2c9ff",
              "on-primary-fixed-variant": "#005da5",
              "on-secondary-fixed-variant": "#595b61",
              "error": "#ee7d77",
              "inverse-primary": "#0061ab",
              "on-error": "#490106",
              "secondary-container": "#393b40",
              "inverse-on-surface": "#51555c",
              "on-primary-fixed": "#004075",
              "secondary-fixed-dim": "#d3d4da",
              "tertiary-dim": "#cecfef",
              "surface-container-lowest": "#000000",
              "on-surface": "#d9e6fd",
              "on-error-container": "#ff9993",
              "on-background": "#d9e6fd",
              "outline-variant": "#3c495b",
              "secondary": "#9c9ea4",
              "inverse-surface": "#f8f9ff",
              "surface-container-highest": "#1a2637",
              "surface-container-high": "#16202e",
              "surface-container-low": "#0e141c",
              "on-surface-variant": "#9facc1",
              "on-tertiary-fixed-variant": "#555873",
              "tertiary-fixed": "#dcddfe",
              "background": "#0a0e14",
              "surface-bright": "#1e2d41",
              "secondary-fixed": "#e1e2e8",
              "primary-dim": "#88bcff",
              "surface-variant": "#1a2637",
              "primary-fixed": "#d3e4ff",
              "tertiary-container": "#dcddfe",
              "secondary-dim": "#9c9ea4",
              "error-container": "#7f2927",
              "tertiary-fixed-dim": "#cecfef",
              "primary": "#a2c9ff",
              "on-tertiary-fixed": "#393c55",
              "surface-container": "#121a25",
              "outline": "#6a768a",
              "on-secondary-fixed": "#3d3f44",
              "on-secondary": "#1e2025",
              "on-primary": "#004176",
              "on-primary-container": "#b4d2ff",
              "on-tertiary": "#545671",
              "surface": "#0a0e14",
              "primary-fixed-dim": "#bbd6ff",
              "tertiary": "#edecff"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"]
            },
            borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
            animation: {
              "blob": "blob 10s infinite",
            },
            keyframes: {
              blob: {
                "0%": {
                  transform: "translate(0px, 0px) scale(1)",
                },
                "33%": {
                  transform: "translate(50px, -70px) scale(1.15)",
                },
                "66%": {
                  transform: "translate(-40px, 40px) scale(0.85)",
                },
                "100%": {
                  transform: "translate(0px, 0px) scale(1)",
                },
              },
            },
          },
        },
      }
  </script>
  <style>
        body {
            background-color: #0d1117;
            color: #d9e6fd;
            font-family: 'Inter', sans-serif;
        }
        .gemini-gradient {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #f4b400);
        }
        .mono-text {
            font-family: 'JetBrains Mono', monospace;
        }
        .content-container {
            max-width: 1200px;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a2637;
        }
  </style>
</head>
<body class="flex flex-col min-h-screen antialiased bg-[#0a0e14] relative overflow-x-hidden">

  <!-- Ambient Background Orbs -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden flex items-center justify-center">
    <div class="absolute top-[10%] left-[10%] w-[500px] h-[500px] bg-red-900/30 rounded-full mix-blend-screen filter blur-[150px] animate-blob" style="animation-duration: 12s;"></div>
    <div class="absolute top-[15%] right-[10%] w-[600px] h-[600px] bg-cyan-900/20 rounded-full mix-blend-screen filter blur-[150px] animate-blob" style="animation-duration: 15s; animation-delay: 2s;"></div>
    <div class="absolute bottom-[10%] left-[15%] w-[550px] h-[550px] bg-orange-900/20 rounded-full mix-blend-screen filter blur-[150px] animate-blob" style="animation-duration: 14s; animation-delay: 4s;"></div>
    <div class="absolute bottom-[15%] right-[15%] w-[450px] h-[450px] bg-fuchsia-900/30 rounded-full mix-blend-screen filter blur-[150px] animate-blob" style="animation-duration: 18s; animation-delay: 1s;"></div>
  </div>

  <header class="bg-[#0a0e14]/80 backdrop-blur-sm fixed top-0 w-full z-50 border-t-2 border-transparent"
  style="border-image: linear-gradient(to right, transparent, #f97316, #d946ef, #06b6d4, transparent) 1;">

  <div class="max-w-[1280px] mx-auto px-6 md:px-10 h-20 flex items-center justify-between">

    {% if page.url != "/" %}
      <a href="/"
         class="text-xl md:text-2xl font-semibold tracking-tight 
                text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-500 
                hover:opacity-80 transition">
        Pratham Chintamani
      </a>
    {% else %}
      <span></span>
    {% endif %}

    <nav class="hidden md:flex gap-8 items-center">

      <a href="/projects"
         class="text-base md:text-lg text-zinc-500 hover:text-white transition">
        Projects
      </a>

      <a href="/publications"
         class="text-base md:text-lg text-zinc-500 hover:text-white transition">
        Publications
      </a>

    </nav>
  </div>
  </header>

  <main class="flex-grow pt-24 pb-8 px-4 md:px-8 flex justify-center">
    <div class="content-container w-full relative">
      <div class="space-y-12">
        {{ content }}
      </div>
    </div>
  </main>

  <footer class="w-full mt-auto py-8 border-t-[0.5px] border-[#1a2637] bg-[#0a0e14] relative">
    <div class="absolute inset-x-0 top-0 h-[1px] bg-gradient-to-r from-transparent via-purple-500/50 to-red-500/0"></div>
    <div class="max-w-[1200px] mx-auto px-4 md:px-8 flex flex-col md:flex-row justify-end items-center gap-6">
      <div class="flex flex-wrap justify-end gap-x-12 gap-y-4">
        <a class="flex items-center gap-2 font-['Inter'] text-[0.75rem] uppercase tracking-widest text-zinc-500 hover:text-zinc-400 transition-colors duration-0" href="https://github.com/prathamchintamani">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
          GitHub
        </a>
        <a class="flex items-center gap-2 font-['Inter'] text-[0.75rem] uppercase tracking-widest text-zinc-500 hover:text-zinc-400 transition-colors duration-0" href="#">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
          Google Scholar
        </a>
        <a class="flex items-center gap-2 font-['Inter'] text-[0.75rem] uppercase tracking-widest text-zinc-500 hover:text-zinc-400 transition-colors duration-0" href="https://linkedin.com/in/prathamchintamani">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
          LinkedIn
        </a>
        <a class="flex items-center gap-2 font-['Inter'] text-[0.75rem] uppercase tracking-widest text-zinc-500 hover:text-zinc-400 transition-colors duration-0" href="mailto:ee23b041@iittp.ac.in">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Email
        </a>
      </div>
    </div>
  </footer>
</body>
</html>
