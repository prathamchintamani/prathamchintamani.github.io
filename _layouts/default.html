<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>{{ site.title }}</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#004882",
              "error-dim": "#bb5551",
              "on-tertiary-container": "#4c4e69",
              "surface-dim": "#0a0e14",
              "on-secondary-container": "#bdbfc5",
              "surface-tint": "#a2c9ff",
              "on-primary-fixed-variant": "#005da5",
              "on-secondary-fixed-variant": "#595b61",
              "error": "#ee7d77",
              "inverse-primary": "#0061ab",
              "on-error": "#490106",
              "secondary-container": "#393b40",
              "inverse-on-surface": "#51555c",
              "on-primary-fixed": "#004075",
              "secondary-fixed-dim": "#d3d4da",
              "tertiary-dim": "#cecfef",
              "surface-container-lowest": "#000000",
              "on-surface": "#d9e6fd",
              "on-error-container": "#ff9993",
              "on-background": "#d9e6fd",
              "outline-variant": "#3c495b",
              "secondary": "#9c9ea4",
              "inverse-surface": "#f8f9ff",
              "surface-container-highest": "#1a2637",
              "surface-container-high": "#16202e",
              "surface-container-low": "#0e141c",
              "on-surface-variant": "#9facc1",
              "on-tertiary-fixed-variant": "#555873",
              "tertiary-fixed": "#dcddfe",
              "background": "#0a0e14",
              "surface-bright": "#1e2d41",
              "secondary-fixed": "#e1e2e8",
              "primary-dim": "#88bcff",
              "surface-variant": "#1a2637",
              "primary-fixed": "#d3e4ff",
              "tertiary-container": "#dcddfe",
              "secondary-dim": "#9c9ea4",
              "error-container": "#7f2927",
              "tertiary-fixed-dim": "#cecfef",
              "primary": "#a2c9ff",
              "on-tertiary-fixed": "#393c55",
              "surface-container": "#121a25",
              "outline": "#6a768a",
              "on-secondary-fixed": "#3d3f44",
              "on-secondary": "#1e2025",
              "on-primary": "#004176",
              "on-primary-container": "#b4d2ff",
              "on-tertiary": "#545671",
              "surface": "#0a0e14",
              "primary-fixed-dim": "#bbd6ff",
              "tertiary": "#edecff"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"]
            },
            borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
          },
        },
      }
  </script>
  <style>
        body {
            background-color: #0d1117;
            color: #d9e6fd;
            font-family: 'Inter', sans-serif;
        }
        .gemini-gradient {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #f4b400);
        }
        .mono-text {
            font-family: 'JetBrains Mono', monospace;
        }
        .content-container {
            max-width: 1024px;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a2637;
        }
        @keyframes float1 {
          0%   { transform: translate(0,0); }
          50%  { transform: translate(40px, 20px); }
          100% { transform: translate(0,0); }
        }

        @keyframes float2 {
          0%   { transform: translate(0,0); }
          50%  { transform: translate(-30px, 30px); }
          100% { transform: translate(0,0); }
        }

        @keyframes float3 {
          0%   { transform: translate(0,0); }
          50%  { transform: translate(20px, -30px); }
          100% { transform: translate(0,0); }
        }

        .animate-float1 { animation: float1 18s ease-in-out infinite; }
        .animate-float2 { animation: float2 22s ease-in-out infinite; }
        .animate-float3 { animation: float3 20s ease-in-out infinite; }
  </style>
</head>
<body class="flex flex-col min-h-screen antialiased bg-[#0d1117] relative overflow-x-hidden">

  <!-- Ambient Radial Background Gradients -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <!-- warm primary -->
    <div class="absolute -top-40 -left-40 w-[600px] h-[600px] 
            bg-orange-500/10 rounded-full blur-[120px] animate-float1"></div>

<div class="absolute top-[30%] -right-40 w-[500px] h-[500px] 
            bg-fuchsia-500/10 rounded-full blur-[110px] animate-float2"></div>

<div class="absolute bottom-[-10%] left-[20%] w-[600px] h-[600px] 
            bg-cyan-500/10 rounded-full blur-[120px] animate-float3"></div>
  </div>

  <header class="bg-[#0a0e14]/80 backdrop-blur-sm fixed top-0 w-full z-50 border-t-2 border-transparent" style="border-image: linear-gradient(to right, transparent, #f97316, #d946ef, #06b6d4, transparent) 1;">
    <div class="max-w-[1280px] mx-auto px-4 md:px-8 h-16 flex items-center justify-between">
      {% if page.url != "/" %}
        <a href="/" class="text-lg font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400 hover:opacity-80 transition-opacity">Pratham Chintamani</a>
      {% else %}
        <span></span>
      {% endif %}
      <nav class="hidden md:flex gap-8 items-center">
        <a class="text-sm text-zinc-500 hover:text-white transition-all duration-200 hover:-translate-y-[1px] transition"
          href="/projects">Projects</a>

        <a class="text-sm text-zinc-500 hover:text-white transition-all duration-200 hover:-translate-y-[1px] transition"
          href="/publications">Publications</a>
      </nav>
    </div>
  </header>

  <main class="flex-grow pt-24 pb-8 px-4 md:px-8 flex justify-center z-10 relative">
    <div class="content-container w-full relative">
      <div class="space-y-12">
        {{ content }}
      </div>
    </div>
  </main>

  <footer class="w-full py-6 border-t-[0.5px] border-[#1a2637] bg-[#0a0e14] relative z-10">
    <div class="absolute inset-x-0 top-0 h-[1px] bg-gradient-to-r from-transparent via-purple-500/50 to-red-500/0"></div>
    <div class="max-w-[1280px] mx-auto px-4 md:px-8 flex flex-col md:flex-row justify-end items-center gap-6">
      <div class="flex flex-wrap gap-8 items-center justify-center">
        <a class="flex items-center gap-1.5 font-['Inter'] text-[0.7rem] uppercase tracking-widest text-zinc-500 text-zinc-500 hover:text-white transition-all duration-200 hover:-translate-y-[1px] transition-colors duration-0" href="https://github.com/prathamchintamani">
          <svg class="w-3.5 h-3.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2c-5.52 0-10 4.48-10 10 0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 10 0 0 12 2Z" clip-rule="evenodd"/></svg>
          GitHub
        </a>
        <a class="flex items-center gap-1.5 font-['Inter'] text-[0.7rem] uppercase tracking-widest text-zinc-500 text-zinc-500 hover:text-white transition-all duration-200 hover:-translate-y-[1px] transition-colors duration-0" href="https://scholar.google.com/">
          <svg class="w-3.5 h-3.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path d="M5.242 13.769L0 9.5 12 0l12 9.5-5.242 4.269C17.548 11.249 14.978 9.5 12 9.5c-2.977 0-5.548 1.748-6.758 4.269zM12 10a7 7 0 1 0 0 14 7 7 0 0 0 0-14z"/></svg>
          Google Scholar
        </a>
        <a class="flex items-center gap-1.5 font-['Inter'] text-[0.7rem] uppercase tracking-widest text-zinc-500 text-zinc-500 hover:text-white transition-all duration-200 hover:-translate-y-[1px] transition-colors duration-0" href="https://linkedin.com/in/prathamchintamani">
          <svg class="w-3.5 h-3.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12.51 8.796v1.697a3.738 3.738 0 0 1 3.288-1.684c3.455 0 3.988 2.139 3.988 4.931v5.928h-3.328V14.55c0-1.25-.025-2.86-1.85-2.86-1.851 0-2.134 1.355-2.134 2.766v5.213h-3.328V8.796h3.364ZM3.332 5.01A1.914 1.914 0 0 1 5.253 3c1.063 0 1.921.847 1.921 1.906 0 1.056-.855 1.908-1.921 1.908-1.06 0-1.921-.852-1.921-1.908Zm3.585 14.656H3.59V8.796h3.327v10.87Z" clip-rule="evenodd"/></svg>
          LinkedIn
        </a>
        <a class="flex items-center gap-1.5 font-['Inter'] text-[0.7rem] uppercase tracking-widest text-zinc-500 text-zinc-500 hover:text-white transition-all duration-200 hover:-translate-y-[1px] transition-colors duration-0" href="mailto:ee23b041@iittp.ac.in">
          <svg class="w-3.5 h-3.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10S2 17.523 2 12Zm11.83-2.184a1.868 1.868 0 0 0-3.66 0l-.634 3.033A1.868 1.868 0 0 0 11.365 15h1.27a1.868 1.868 0 0 0 1.829-2.15l-.634-3.034ZM12 8.5a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1Z" clip-rule="evenodd"/></svg>
          Email
        </a>
      </div>
    </div>
  </footer>
</body>
</html>
